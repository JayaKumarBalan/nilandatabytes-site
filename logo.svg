<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d36"/>
      <stop offset="100%" style="stop-color:#005f52"/>
    </linearGradient>
    <linearGradient id="diskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd9c0"/>
      <stop offset="100%" style="stop-color:#26a69a"/>
    </linearGradient>
    <linearGradient id="diskGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38c9b0"/>
      <stop offset="100%" style="stop-color:#1a9488"/>
    </linearGradient>
    <linearGradient id="diskGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#26b8a0"/>
      <stop offset="100%" style="stop-color:#12857a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="400" height="400" rx="72" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.07" stroke="#4dd9c0" stroke-width="1">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Glow circle behind DB -->
  <circle cx="200" cy="168" r="95" fill="#26a69a" opacity="0.08"/>

  <!-- === DATABASE ICON === -->
  <!-- Cylinder body top -->
  <rect x="122" y="108" width="156" height="46" fill="#1a7a6e"/>
  <!-- Cylinder body middle -->
  <rect x="122" y="154" width="156" height="46" fill="#166960"/>
  <!-- Cylinder body bottom -->
  <rect x="122" y="200" width="156" height="40" fill="#125a52"/>

  <!-- Top disk (brightest) -->
  <ellipse cx="200" cy="108" rx="78" ry="22" fill="url(#diskGrad)" filter="url(#glow)"/>

  <!-- Mid disk -->
  <ellipse cx="200" cy="154" rx="78" ry="22" fill="url(#diskGrad2)"/>

  <!-- Third disk -->
  <ellipse cx="200" cy="200" rx="78" ry="22" fill="url(#diskGrad3)"/>

  <!-- Bottom disk -->
  <ellipse cx="200" cy="240" rx="78" ry="22" fill="#1a8878" opacity="0.9"/>

  <!-- Highlight stripe on each disk face -->
  <ellipse cx="200" cy="108" rx="50" ry="10" fill="white" opacity="0.08"/>
  <ellipse cx="200" cy="154" rx="50" ry="10" fill="white" opacity="0.05"/>
  <ellipse cx="200" cy="200" rx="50" ry="10" fill="white" opacity="0.04"/>

  <!-- Horizontal lines on body (data lines) -->
  <line x1="136" y1="128" x2="264" y2="128" stroke="#4dd9c0" stroke-width="1.2" opacity="0.25"/>
  <line x1="136" y1="174" x2="264" y2="174" stroke="#4dd9c0" stroke-width="1.2" opacity="0.2"/>

  <!-- Floating data nodes (right side) -->
  <circle cx="318" cy="130" r="7" fill="#4dd9c0" opacity="0.9" filter="url(#glow)"/>
  <circle cx="340" cy="160" r="4.5" fill="#4dd9c0" opacity="0.6"/>
  <circle cx="326" cy="192" r="5.5" fill="#4dd9c0" opacity="0.5"/>
  <line x1="278" y1="130" x2="311" y2="130" stroke="#4dd9c0" stroke-width="1.5" opacity="0.4"/>
  <line x1="318" y1="137" x2="340" y2="156" stroke="#4dd9c0" stroke-width="1.2" opacity="0.3"/>
  <line x1="336" y1="164" x2="326" y2="187" stroke="#4dd9c0" stroke-width="1.2" opacity="0.3"/>

  <!-- Floating data nodes (left side) -->
  <circle cx="82" cy="148" r="6" fill="#4dd9c0" opacity="0.7" filter="url(#glow)"/>
  <circle cx="64" cy="178" r="4" fill="#4dd9c0" opacity="0.5"/>
  <line x1="122" y1="152" x2="88" y2="150" stroke="#4dd9c0" stroke-width="1.5" opacity="0.35"/>
  <line x1="82" y1="154" x2="66" y2="175" stroke="#4dd9c0" stroke-width="1.2" opacity="0.3"/>

  <!-- === WORDMARK === -->
  <!-- "NILAN" -->
  <text x="200" y="306"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="48"
    fill="white"
    text-anchor="middle"
    letter-spacing="7">NILAN</text>

  <!-- "DATABYTES" in accent color -->
  <text x="200" y="344"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-weight="400"
    font-size="22"
    fill="#4dd9c0"
    text-anchor="middle"
    letter-spacing="6.5">DATABYTES</text>

  <!-- Thin divider line between text and icon -->
  <line x1="130" y1="270" x2="270" y2="270" stroke="#4dd9c0" stroke-width="1" opacity="0.4"/>
</svg>
